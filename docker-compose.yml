services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector-financial
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB:       ${POSTGRES_DB:-financial_agent}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data   # persist data across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-financial_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Financial Research Agent API ───────────────────────────────────────────
  agent:
    build: .
    container_name: financial-agent
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TAVILY_API_KEY:    ${TAVILY_API_KEY}
      CLAUDE_MODEL:      ${CLAUDE_MODEL:-claude-sonnet-4-6}
      MAX_ITERATIONS:    ${MAX_ITERATIONS:-8}
      # Point to the pgvector service by container name
      PGVECTOR_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ragpassword}@pgvector:5432/${POSTGRES_DB:-financial_agent}
      API_HOST:     0.0.0.0
      API_PORT:     8000
    depends_on:
      pgvector:
        condition: service_healthy   # wait for postgres to be ready
    restart: unless-stopped

volumes:
  pgvector_data:
    driver: local
